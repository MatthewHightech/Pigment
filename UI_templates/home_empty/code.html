<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .organic-radius {
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-[#FBF9F4] dark:bg-[#1B1C19] flex justify-between items-center w-full px-8 py-6 max-w-7xl mx-auto sticky top-0 z-40">
<div class="flex items-center gap-4">
<button class="text-[#823B18] dark:text-[#A0522D] hover:opacity-80 transition-opacity active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
<h1 class="font-serif italic text-2xl text-[#1B1C19] dark:text-[#FBF9F4]">Pigment</h1>
<div class="flex items-center gap-4">
<button class="text-[#823B18] dark:text-[#A0522D] hover:opacity-80 transition-opacity active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</header>
<!-- Main Content: Empty State Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 py-20 text-center relative overflow-hidden">
<!-- Subtle background texture/blob -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-surface-container-low organic-radius -z-10 opacity-40"></div>
<div class="max-w-xl w-full flex flex-col items-center gap-12">
<!-- Central Illustration: Empty Canvas/Palette -->
<div class="relative group">
<div class="w-72 h-96 bg-surface-container-lowest shadow-[0_40px_60px_rgba(27,28,25,0.04)] rounded-lg flex items-center justify-center p-8 transition-transform duration-700 hover:rotate-2">
<div class="w-full h-full border border-dashed border-outline-variant opacity-30 rounded flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant text-6xl opacity-20" data-icon="palette">palette</span>
</div>
</div>
<!-- Artistic Detail: Stacked paper effect -->
<div class="absolute -bottom-4 -right-4 w-72 h-96 bg-surface-container-low rounded-lg -z-10"></div>
<div class="absolute -bottom-8 -right-8 w-72 h-96 bg-surface-container-high rounded-lg -z-20 opacity-50"></div>
</div>
<!-- Typography Content -->
<div class="space-y-6">
<h2 class="font-headline text-5xl md:text-6xl italic text-on-surface tracking-tight">Your studio is empty.</h2>
<p class="font-label uppercase tracking-[0.2em] text-xs text-on-surface-variant max-w-xs mx-auto leading-relaxed">
                    The canvas awaits your first brushstroke. Tap + to start your first project.
                </p>
</div>
</div>
<!-- Floating Action Button -->
<div class="fixed bottom-28 md:bottom-12 right-8 md:right-16 z-50">
<button class="bg-primary text-on-primary w-20 h-20 organic-radius flex items-center justify-center shadow-[0_20px_40px_rgba(130,59,24,0.15)] hover:opacity-90 transition-all active:scale-90 duration-200 group">
<span class="material-symbols-outlined text-4xl" data-icon="add" style="font-variation-settings: 'FILL' 0, 'wght' 300;">add</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#FBF9F4]/80 dark:bg-[#1B1C19]/80 backdrop-blur-xl md:hidden">
<!-- Dashboard / Grid View (Active) -->
<a class="flex items-center justify-center bg-[#823B18] dark:bg-[#A0522D] text-white rounded-full w-12 h-12 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</a>
<!-- Palette / Studio -->
<a class="flex items-center justify-center text-[#1B1C19] dark:text-[#FBF9F4] w-12 h-12 hover:bg-[#E4E2DD] dark:hover:bg-[#3E3F3A] rounded-full transition-all" href="#">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</a>
<!-- Profile -->
<a class="flex items-center justify-center text-[#1B1C19] dark:text-[#FBF9F4] w-12 h-12 hover:bg-[#E4E2DD] dark:hover:bg-[#3E3F3A] rounded-full transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
<!-- Global Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-[0.02] mix-blend-multiply z-[100]" data-alt="subtle fine grain canvas texture overlay for artistic feel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBR-T8fzhwIdnL79Uujkg-jYn2ZGhCgo2k2zoj8_e2vr5eEo6JnToM_hQxfKfhEINBwR1SH7YpAMerSnKFzD1PH66Q3Bs0pY6sBW4mWHFL142B2QVzir7dtSam5qMaR3bFV_FybST_sdUYfWCPfaoZyUDkPs-GnnjefrrsV6cAdD3FBYPUdjrv4qRtqLHqK7CGtnyZXDHLo4-34z5cmtmkg2lpMag_BpyuEiRs0icjr7ii6MM5LzR3jHnF-WYcbJpeQGYb3hS0_6HXB');"></div>
</body></html>
