<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pigment - Color Picker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-surface-variant": "#54433c",
              "outline": "#87736b",
              "background": "#fbf9f4",
              "on-background": "#1b1c19",
              "on-tertiary-fixed": "#1b1c1c",
              "on-primary-fixed-variant": "#76320f",
              "surface": "#fbf9f4",

              "inverse-primary": "#ffb596",

              "secondary": "#904d00",

              "error": "#ba1a1a",

              "error-container": "#ffdad6",
              "tertiary-fixed": "#e4e2e1",

              "on-tertiary-container": "#e9e6e6",

              "label": ["Manrope", "sans-serif"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.canvas-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAwqmOEWGFS25YcGN3senmEGzapr8UKs3jqFgXQ0i6IvbOthUcIoLqr8t0dyGvbPO7M6VRlWD7wdOIV7fJLsLZWgXfhHtk3JTf4-2XGYNKEl5QNZbHXzl5AZBxIFVtle5KBhA4lGGs0524vtIA5kQEU1jCYhrfAe76wZnZRXRerfzams5PBOTLu7c-LbwP_7mwrIQLIIKKpw9YVQacqfAavER5fS596LV4dnlbylSVyCwBD9OUB9jDva4hA8kZcIHCTuuLYHVk8cQ3H);
    background-size: cover;
    background-position: center
    }
.crosshair-line {
    background-color: rgba(255, 255, 255, 0.8)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#F5F3EE] dark:bg-[#2A2B26]">
<div class="flex justify-between items-center w-full px-8 py-6 max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-[#823B18] dark:text-[#A0522D]">close</span>
</button>
<h1 class="font-serif italic text-2xl text-[#1B1C19] dark:text-[#FBF9F4]">Pigment</h1>
</div>
<div class="flex items-center gap-6">
<span class="font-sans uppercase tracking-widest text-xs text-[#1B1C19]/60 dark:text-[#FBF9F4]/60">Sampler Tool</span>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-[#823B18] dark:text-[#A0522D]">history</span>
</button>
</div>
</div>
</header>
<!-- Main Viewport / Color Picker Canvas -->
<main class="relative w-full h-screen canvas-bg flex items-center justify-center" data-alt="High-resolution close-up of textured oil painting with visible brushstrokes and earthy sienna and ochre tones with soft studio lighting.">
<!-- Crosshair UI -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 border border-white/40 rounded-full backdrop-blur-[2px]"></div>
<!-- Horizontal Line -->
<div class="absolute w-full h-[1px] crosshair-line"></div>
<!-- Vertical Line -->
<div class="absolute w-[1px] h-full crosshair-line"></div>
<!-- Center Point -->
<div class="w-3 h-3 bg-white rounded-full shadow-lg border border-black/10 z-10"></div>
<!-- Preview Bubble (Anchored to Picker) -->
<div class="absolute -top-24 left-1/2 -translate-x-1/2 flex flex-col items-center gap-3">
<div class="w-16 h-16 rounded-full border-4 border-white shadow-2xl bg-[#823B18] ring-1 ring-black/5"></div>
<div class="px-3 py-1 bg-white/90 backdrop-blur-md rounded-full shadow-sm">
<span class="font-label text-[10px] uppercase tracking-widest font-bold text-on-surface">#823B18</span>
</div>
</div>
</div>
<!-- Floating UI Panels -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-full max-w-md px-6">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex flex-col gap-8">
<!-- Color Info Grid -->
<div class="grid grid-cols-3 gap-4">
<div class="flex flex-col gap-1">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant opacity-60">Hue</span>
<span class="text-sm font-medium">18°</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant opacity-60">Saturation</span>
<span class="text-sm font-medium">70%</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant opacity-60">Luminance</span>
<span class="text-sm font-medium">30%</span>
</div>
</div>
<!-- Primary Action -->
<button class="group w-full bg-primary hover:opacity-90 transition-all active:scale-95 py-5 rounded-full flex items-center justify-center gap-3 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">palette</span>
<span class="text-white font-label font-bold uppercase tracking-widest text-sm">Add to Palette</span>
</button>
</div>
</div>
<!-- Tool Context Hint -->
<div class="absolute top-32 left-8 hidden md:block">
<div class="bg-surface-container-lowest/60 backdrop-blur-md px-4 py-3 rounded-xl border border-white/20">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface leading-relaxed">
                    Drag the lens to<br/>extract pigments from<br/>the canvas source.
                </p>
</div>
</div>
</main>
<!-- Navigation Shell (Bottom) - Suppressed for transactional/tool screen as per rules -->
<!-- But keeping for visual context if it was a top level, here it's suppressed for UX focus -->
<!-- Sidebar Tools (Studio Specific) -->
<aside class="fixed right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-40">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl p-2 rounded-full shadow-xl flex flex-col gap-2">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-primary">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">contrast</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</aside>
</body></html>
